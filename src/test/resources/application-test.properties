spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
viplev.url=http://localhost:9999
viplev.token=test-token
viplev.environment-id=00000000-0000-0000-0000-000000000001
agent.k6-image=grafana/k6:0.53.0
agent.k6-network=viplev_agent
agent.k6-timeout-ms=300000
agent.k6-log-max-bytes=4000
agent.k6-system-tags=method,url,status,group
agent.k6-performance-flush-interval-ms=50
agent.k6-performance-max-batch-points=2000
agent.k6-performance-max-buffered-points=20000
agent.k6-performance-send-max-retries=3
agent.k6-performance-send-backoff-ms=50
agent.k6-performance-final-flush-timeout-ms=1000
agent.run-status-reason-max-length=2000
agent.message-polling-enabled=true
agent.cadvisor-container-name=viplev-cadvisor
agent.node-exporter-container-name=viplev-node-exporter
agent.clear-buffered-metrics-on-start=true
