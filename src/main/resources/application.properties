spring.application.name=agent

# Container runtime profile (docker or kubernetes)
spring.profiles.active=${VIPLEV_RUNTIME:docker}

# VIPLEV platform
viplev.url=${VIPLEV_URL:http://localhost:8080}
viplev.token=${VIPLEV_TOKEN:}
viplev.environment-id=${VIPLEV_ENVIRONMENT_ID:}

# SQLite datasource
spring.datasource.url=jdbc:sqlite:./agent.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Exporter images
agent.cadvisor-image=${VIPLEV_CADVISOR_IMAGE:gcr.io/cadvisor/cadvisor:v0.51.0}
agent.node-exporter-image=${VIPLEV_NODE_EXPORTER_IMAGE:prom/node-exporter:v1.9.0}
agent.cadvisor-container-name=${VIPLEV_CADVISOR_CONTAINER_NAME:viplev-cadvisor}
agent.node-exporter-container-name=${VIPLEV_NODE_EXPORTER_CONTAINER_NAME:viplev-node-exporter}

# Exporter ports
agent.node-exporter-port=${VIPLEV_NODE_EXPORTER_PORT:9100}
agent.cadvisor-port=${VIPLEV_CADVISOR_PORT:8080}

# Message polling
agent.message-polling-enabled=${VIPLEV_MESSAGE_POLLING_ENABLED:true}
agent.message-polling-idle-interval-ms=${VIPLEV_MESSAGE_POLLING_IDLE_MS:15000}
agent.message-polling-active-interval-ms=${VIPLEV_MESSAGE_POLLING_ACTIVE_MS:5000}
agent.message-polling-tick-ms=${VIPLEV_MESSAGE_POLLING_TICK_MS:1000}

# K6 execution
agent.k6-image=${VIPLEV_K6_IMAGE:grafana/k6:0.53.0}
agent.k6-network=${VIPLEV_K6_NETWORK:viplev_agent}
agent.k6-completion-poll-interval-ms=${VIPLEV_K6_COMPLETION_POLL_INTERVAL_MS:1000}
agent.k6-timeout-ms=${VIPLEV_K6_TIMEOUT_MS:300000}
agent.k6-log-max-bytes=${VIPLEV_K6_LOG_MAX_BYTES:4000}
agent.k6-output-log-max-bytes=${VIPLEV_K6_OUTPUT_LOG_MAX_BYTES:500000}
agent.run-status-reason-max-length=${VIPLEV_RUN_STATUS_REASON_MAX_LENGTH:2000}

# Actuator
management.endpoints.web.exposure.include=health,info
